name = "zsms-chat-realtime"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Set via `wrangler secret put CHAT_DO_SHARED_SECRET`
# [vars] kept empty — secrets must not live in source control.

[[durable_objects.bindings]]
name = "CHAT_SESSION"
class_name = "ChatSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatSessionDO"]
