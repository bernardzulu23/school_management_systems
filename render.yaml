# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect an existing Postgres (migrations already applied): set DATABASE_URL in the dashboard
# to the **External** connection string, then deploy. After you know the public URL, set
# NEXT_PUBLIC_APP_URL and NEXT_PUBLIC_APP_ORIGIN to that URL and redeploy so client bundles pick them up.

services:
  - type: web
    name: school-management-system
    runtime: docker
    healthCheckPath: /api/ping
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_ORIGIN
        sync: false
      - key: SERVER_ENCRYPTION_KEY
        sync: false
      - key: NEXT_PUBLIC_ENCRYPTION_KEY
        sync: false
