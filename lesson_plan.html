
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .planner { padding: 1.5rem 0; }
  .header { margin-bottom: 1.5rem; }
  .badge { display: inline-block; background: var(--color-background-success); color: var(--color-text-success); font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; font-weight: 500; }
  .header h1 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field select, .field input, .field textarea { width: 100%; font-family: var(--font-sans); font-size: 14px; }
  .field textarea { resize: vertical; min-height: 70px; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  .field textarea:focus { outline: none; border-color: var(--color-border-primary); box-shadow: 0 0 0 2px var(--color-background-info); }
  .section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-tertiary); border-bottom: 0.5px solid var(--color-border-tertiary); padding-bottom: 8px; margin: 16px 0 12px; }
  .generate-btn { width: 100%; padding: 12px; border-radius: var(--border-radius-md); border: none; background: var(--color-background-success); color: var(--color-text-success); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; font-family: var(--font-sans); transition: opacity 0.15s; }
  .generate-btn:hover { opacity: 0.85; }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); margin: 12px 0; min-height: 24px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--color-border-secondary); border-top-color: var(--color-text-success); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .output-area { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); overflow: hidden; }
  .output-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .output-header span { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .output-actions { display: flex; gap: 8px; }
  .action-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
  .action-btn:hover { background: var(--color-background-secondary); }
  .output-content { padding: 20px; font-size: 14px; line-height: 1.7; color: var(--color-text-primary); white-space: pre-wrap; max-height: 600px; overflow-y: auto; }
  .competence-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.1s; }
  .tag.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .error-msg { background: var(--color-background-danger); color: var(--color-text-danger); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; margin-top: 8px; }
  .plan-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .plan-section:last-child { border-bottom: none; margin-bottom: 0; }
  .plan-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-tertiary); margin-bottom: 6px; }
  .plan-value { font-size: 14px; color: var(--color-text-primary); line-height: 1.6; }
  .loading-skeleton { background: var(--color-background-secondary); border-radius: var(--border-radius-md); height: 14px; margin-bottom: 8px; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>

<div class="planner">
  <div class="header">
    <div class="badge">Zambia CBC 2023</div>
    <h1>AI Lesson Plan Generator</h1>
    <p>Competence-Based Curriculum — aligned to ZECF 2023 & TCIG guidelines</p>
  </div>

  <div class="section-title">Subject & Level</div>
  <div class="form-grid">
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <optgroup label="Core">
          <option>Mathematics</option>
          <option>English</option>
          <option>Additional Mathematics</option>
        </optgroup>
        <optgroup label="Science">
          <option>Science</option>
          <option>Biology</option>
          <option>Chemistry</option>
          <option>Physics</option>
          <option>Agriculture Science</option>
        </optgroup>
        <optgroup label="Humanities">
          <option>Geography</option>
          <option>History</option>
          <option>Civic Education</option>
          <option>Social Studies</option>
          <option>Religious Education 2046</option>
        </optgroup>
        <optgroup label="Business">
          <option>Commerce</option>
          <option>Principles of Accounts</option>
          <option>Business Studies</option>
        </optgroup>
        <optgroup label="Languages">
          <option>Bemba</option>
          <option>Chichewa</option>
          <option>Chinese</option>
          <option>Chitonga</option>
          <option>Kikaonde</option>
          <option>Lunda</option>
          <option>Luvale</option>
          <option>Silozi</option>
          <option>French</option>
          <option>Literature in English</option>
        </optgroup>
        <optgroup label="Technology">
          <option>Computer Studies</option>
          <option>Information Technology</option>
          <option>Design and Technology</option>
        </optgroup>
        <optgroup label="Practical">
          <option>Home Management</option>
          <option>Fashion and Fabrics</option>
          <option>Food and Nutrition</option>
          <option>Physical Education</option>
          <option>Metalwork</option>
          <option>Woodwork</option>
        </optgroup>
        <optgroup label="Arts">
          <option>Music</option>
        </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Grade / Form</label>
      <select id="grade">
        <optgroup label="Primary">
          <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
          <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
        </optgroup>
        <optgroup label="Secondary (Ordinary)">
          <option>Form 1</option><option>Form 2</option><option>Form 3</option><option>Form 4</option>
        </optgroup>
        <optgroup label="Secondary (Advanced)">
          <option>Form 5</option><option>Form 6</option>
        </optgroup>
      </select>
    </div>
  </div>

  <div class="section-title">Lesson Details</div>
  <div class="form-full field">
    <label>Topic</label>
    <input type="text" id="topic" placeholder="e.g. Fractions and Decimals" />
  </div>
  <div class="form-full field">
    <label>Sub-topic (optional)</label>
    <input type="text" id="subtopic" placeholder="e.g. Converting fractions to decimals" />
  </div>
  <div class="form-grid three">
    <div class="field">
      <label>Duration</label>
      <select id="duration">
        <option>30 minutes</option>
        <option>40 minutes</option>
        <option selected>80 minutes</option>
        <option>Double period (80 min)</option>
      </select>
    </div>
    <div class="field">
      <label>No. of Learners</label>
      <input type="number" id="learners" value="35" min="1" max="100" />
    </div>
    <div class="field">
      <label>Term</label>
      <select id="term">
        <option>Term 1</option><option>Term 2</option><option>Term 3</option>
      </select>
    </div>
  </div>

  <div class="section-title">Lesson Plan Template</div>
  <div class="field">
    <label>Template Type</label>
    <select id="template">
      <option value="standard">Standard CBC (All Subjects)</option>
      <option value="science">Science Practical Lab Lesson</option>
      <option value="language">Language Skills Lesson (LSRW)</option>
      <option value="business">Business & Accounts Lesson</option>
      <option value="practical">Vocational/Practical Workshop Lesson</option>
      <option value="humanities">Humanities & Social Sciences Lesson</option>
      <option value="arts">Arts, Music & Creative Lesson</option>
      <option value="technology">Technology & ICT Lesson</option>
      <option value="mathematics">Mathematics Lesson (Problem-Based)</option>
    </select>
  </div>

  <div class="section-title">Competence Focus</div>
  <div class="competence-tags" id="competenceTags">
    <span class="tag active" data-val="Critical Thinking and Problem Solving">Critical Thinking</span>
    <span class="tag" data-val="Communication">Communication</span>
    <span class="tag" data-val="Cooperation">Cooperation</span>
    <span class="tag" data-val="Self-Management">Self-Management</span>
    <span class="tag" data-val="Creativity and Innovation">Creativity</span>
    <span class="tag" data-val="Entrepreneurship">Entrepreneurship</span>
  </div>

  <div class="form-full field">
    <label>Additional Instructions (optional)</label>
    <textarea id="extras" placeholder="e.g. Include a group activity, focus on learners with special needs, add a real-life Zambian context example..."></textarea>
  </div>

  <button class="generate-btn" id="genBtn" onclick="generatePlan()">Generate CBC Lesson Plan</button>

  <div class="status" id="statusBar"></div>
  <div id="errorBox"></div>
  <div id="outputArea" style="display:none;" class="output-area">
    <div class="output-header">
      <span id="outputTitle">Generated Lesson Plan</span>
      <div class="output-actions">
        <button class="action-btn" onclick="copyPlan()">Copy</button>
        <button class="action-btn" onclick="sendPrompt('Can you improve the assessment section of this lesson plan and add more SBA task ideas?')">Improve Assessment ↗</button>
        <button class="action-btn" onclick="sendPrompt('Can you create a scheme of work for a full term based on this lesson plan topic and subject?')">Full Scheme ↗</button>
      </div>
    </div>
    <div class="output-content" id="outputContent"></div>
  </div>
</div>

<script>
  const tags = document.querySelectorAll('.competence-tags .tag');
  tags.forEach(t => t.addEventListener('click', () => t.classList.toggle('active')));

  function getActiveCompetences() {
    return [...document.querySelectorAll('.tag.active')].map(t => t.dataset.val).join(', ') || 'Critical Thinking and Problem Solving';
  }

  const templates = {
    standard: `You are an expert Zambian teacher educator. Generate a COMPLETE, detailed Competency-Based Curriculum (CBC) lesson plan following the 2023 Zambia Education Curriculum Framework (ZECF) and Teachers' Curriculum Implementation Guide (TCIG). Use the exact sections below with clear headings.`,
    science: `You are an expert Zambian science teacher educator. Generate a COMPLETE CBC lesson plan for a PRACTICAL SCIENCE LAB lesson. Include: safety precautions, hypothesis, materials list, experimental procedure, observation table, and a practical skills assessment rubric. Follow the 2023 ZECF.`,
    language: `You are an expert Zambian language teacher educator. Generate a COMPLETE CBC lesson plan for a LANGUAGE SKILLS lesson covering all four skills: Listening, Speaking, Reading, Writing (LSRW). Include oral activities, text analysis, and writing tasks. Follow 2023 ZECF.`,
    business: `You are an expert Zambian business education teacher. Generate a COMPLETE CBC lesson plan for a BUSINESS subject lesson. Include case studies from Zambian business context, financial calculations or document completion tasks, and entrepreneurship linkages. Follow 2023 ZECF.`,
    practical: `You are an expert Zambian practical subjects teacher. Generate a COMPLETE CBC lesson plan for a WORKSHOP/PRACTICAL SKILLS lesson. Include: workshop safety rules, tool list, step-by-step practical procedure, safety precautions, product quality assessment rubric. Follow 2023 ZECF.`,
    humanities: `You are an expert Zambian humanities teacher. Generate a COMPLETE CBC lesson plan for a HUMANITIES lesson. Include: primary/secondary source analysis, map work or timeline where relevant, debate or discussion activity, Zambian local context, citizenship values. Follow 2023 ZECF.`,
    arts: `You are an expert Zambian arts teacher. Generate a COMPLETE CBC lesson plan for an ARTS/MUSIC lesson. Include: Zambian cultural context, creative performance or production task, reflection activity, and portfolio-based assessment. Follow 2023 ZECF.`,
    technology: `You are an expert Zambian ICT/Technology teacher. Generate a COMPLETE CBC lesson plan for a TECHNOLOGY lesson. Include: step-by-step practical computer/design task, digital literacy and cybersafety cross-cutting link, ICT tool specification, and project-based assessment. Follow 2023 ZECF.`,
    mathematics: `You are an expert Zambian mathematics teacher educator. Generate a COMPLETE CBC lesson plan for a MATHEMATICS PROBLEM-BASED lesson. Include: real-life Zambian context problems, mental math warm-up, discovery activity, worked examples, differentiated practice exercises (basic/intermediate/challenging). Follow 2023 ZECF.`
  };

  const planStructure = `
The lesson plan MUST include ALL of the following sections, clearly labelled:

LESSON PLAN HEADER
- School Name: [School Name]
- Subject: {subject}
- Grade/Form: {grade}
- Topic: {topic}
- Sub-topic: {subtopic}
- Date: [Date]
- Duration: {duration}
- Number of Learners: {learners}
- Term: {term}

1. GENERAL COMPETENCE
   State the broad competence from the Zambia CBC syllabus.

2. SPECIFIC COMPETENCE(S)
   State precise, measurable competence(s) targeted in this lesson — aligned to the focus: {competences}

3. LEARNING OUTCOMES (Know-Do-Value)
   - KNOW: what learners will know/understand
   - DO: what learners will be able to demonstrate/perform
   - VALUE: what attitudes/values learners will develop

4. CORE VALUES ADDRESSED
   From the four CBC value categories: Personal Excellence, Relationships, Citizenship, Faith in God
   Name at least 2 specific values with brief explanation of how they are developed.

5. PRE-REQUISITE KNOWLEDGE
   What learners already know before this lesson.

6. TEACHING & LEARNING MATERIALS (TLMs)
   List all materials — must include at least one hands-on/practical resource for CBC compliance.

7. CROSS-CUTTING ISSUES
   Identify at least 2 relevant cross-cutting issues with brief explanation of how each is integrated.

8. LESSON PROCEDURE (Learner-Centred — 5 Phases)
   For each phase show: Teacher Activity | Learner Activity | Competence Developed | Time

   Phase 1: INTRODUCTION/ENGAGEMENT (Hook — real-life Zambian context)
   Phase 2: DEVELOPMENT/EXPLORATION (Discovery, group investigation)
   Phase 3: EXPLANATION/CONSOLIDATION (Teacher guides, deepens understanding)
   Phase 4: APPLICATION/ELABORATION (Apply to new real-life context)
   Phase 5: ASSESSMENT/EVALUATION (Competence demonstration)

   NOTE: Learner activities must take MORE time and depth than teacher activities — CBC is learner-centred.

9. BLOOM'S TAXONOMY LEVELS TARGETED
   List which levels are addressed (Apply, Analyse, Evaluate, Create preferred — higher order).

10. SCHOOL-BASED ASSESSMENT (SBA)
    - Formative assessment strategy used DURING the lesson
    - SBA task description (project/portfolio/practical that contributes to final grade)
    - Assessment criteria/rubric with at least 3 performance levels
    - How evidence of competence is gathered

11. DIFFERENTIATION / INCLUSIVE EDUCATION
    - How the lesson caters for learners with Special Educational Needs
    - Stretch activities for gifted learners
    - Support strategies for struggling learners

12. ICT INTEGRATION
    State specifically how ICT is used or could be used in this lesson.

13. CAREER PATHWAY LINK
    Link this lesson to either Academic or Vocational pathway and name a relevant career.

14. VISION 2030 ALIGNMENT
    One sentence linking this lesson to Zambia's Vision 2030.

15. REFERENCES
    - Syllabus page/section reference
    - Textbook(s)
    - ZECF 2023 reference

16. TEACHER'S SELF-REFLECTION (to be completed after lesson)
    Provide guiding questions for the teacher to reflect on.
`;

  let fullPlanText = '';

  async function generatePlan() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { alert('Please enter a topic.'); return; }

    const subject = document.getElementById('subject').value;
    const grade = document.getElementById('grade').value;
    const subtopic = document.getElementById('subtopic').value || 'Not specified';
    const duration = document.getElementById('duration').value;
    const learners = document.getElementById('learners').value;
    const term = document.getElementById('term').value;
    const templateKey = document.getElementById('template').value;
    const competences = getActiveCompetences();
    const extras = document.getElementById('extras').value.trim();

    const btn = document.getElementById('genBtn');
    const status = document.getElementById('statusBar');
    const errorBox = document.getElementById('errorBox');
    const outputArea = document.getElementById('outputArea');
    const outputContent = document.getElementById('outputContent');
    const outputTitle = document.getElementById('outputTitle');

    btn.disabled = true;
    errorBox.innerHTML = '';
    outputArea.style.display = 'none';
    status.innerHTML = '<div class="spinner"></div> Generating your CBC lesson plan — this may take 30–60 seconds...';

    const systemPrompt = templates[templateKey];
    const structure = planStructure
      .replace('{subject}', subject)
      .replace('{grade}', grade)
      .replace('{topic}', topic)
      .replace('{subtopic}', subtopic)
      .replace('{duration}', duration)
      .replace('{learners}', learners)
      .replace('{term}', term)
      .replace('{competences}', competences);

    const userMsg = `${systemPrompt}\n\n${structure}\n\nAdditional instructions from teacher: ${extras || 'None'}\n\nGenerate the complete, detailed, ready-to-use CBC lesson plan now. Be thorough, practical, and ensure all 16 sections are fully developed. Use Zambian local examples and contexts throughout.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: userMsg }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.content?.map(b => b.text || '').join('') || '';
      fullPlanText = text;

      outputTitle.textContent = `${subject} — ${topic} (${grade})`;
      outputContent.textContent = text;
      outputArea.style.display = 'block';
      status.innerHTML = '<span style="color:var(--color-text-success)">&#10003; Lesson plan generated successfully</span>';
    } catch (err) {
      status.innerHTML = '';
      errorBox.innerHTML = `<div class="error-msg">Error: ${err.message}. Please try again.</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function copyPlan() {
    if (!fullPlanText) return;
    navigator.clipboard.writeText(fullPlanText).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
