# Cloudflare Workers — deploy: npm run deploy
# Docs: docs/doc/CLOUDFLARE_DEPLOY.md

name = "school-management-system"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_APP_NAME = "Zambian School Management System"
NEXT_PUBLIC_APP_VERSION = "2.0.0"
NEXT_PUBLIC_PWA_ENABLED = "true"
NEXT_PUBLIC_OFFLINE_MODE = "true"
NODE_ENV = "production"

# Secrets: npx wrangler secret put DATABASE_URL
# npx wrangler secret put DIRECT_URL
# npx wrangler secret put JWT_SECRET
# npx wrangler secret put JWT_REFRESH_SECRET

[observability]
enabled = true
