# ZSMS Security Audit — runs on PRs to main, pushes to main/develop, and weekly.
#
# 1. Fails the build if HIGH/CRITICAL vulnerabilities exist in production deps.
# 2. Runs the Vitest suite (includes __tests__/security/*).
# 3. Scans the diff for committed secrets.
name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 08:00 Africa/Lusaka (UTC+2)

jobs:
  security-audit:
    name: Dependency audit + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          HUSKY: '0'

      - name: Security audit (production deps, fail on high)
        run: npm run audit:security

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters
          NODE_ENV: test

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for diff-based scanning

      - name: Scan for committed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
