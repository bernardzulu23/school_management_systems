# ZSMS Security Audit — runs on PRs to main, pushes to main/develop, and weekly.
#
# 1. Fails the build if HIGH/CRITICAL vulnerabilities exist in production deps.
# 2. Runs the Vitest suite (includes __tests__/security/*).
# 3. Scans the diff for committed secrets.
name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 08:00 Africa/Lusaka (UTC+2)

jobs:
  security-audit:
    name: Dependency audit + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          HUSKY: '0'

      - name: Security audit (production deps, fail on high)
        run: npm run audit:security

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters
          NODE_ENV: test

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history for diff-based scanning

      - name: Scan for committed secrets
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
